<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AFRINODE | Arbitrage Scanner</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
        radial-gradient(circle at top,#12203d 0%,#071018 35%,#030712 100%);
    color:#fff;
    min-height:100vh;
    padding-bottom:90px;
}

.glass{
    background:rgba(15,23,42,.72);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
}

.card-glow{
    box-shadow:
        0 0 20px rgba(0,255,255,.08),
        0 0 60px rgba(34,211,238,.08);
}

.page{
    display:none;
}

.page.active{
    display:block;
}

.nav-btn{
    transition:.25s;
}

.nav-btn.active{
    color:#22d3ee;
}

.arb-card{
    border-radius:22px;
    padding:18px;
    background:
        linear-gradient(
            145deg,
            rgba(15,23,42,.98),
            rgba(8,15,25,.98)
        );

    border:1px solid rgba(255,255,255,.06);

    transition:.3s;
}

.arb-card:hover{
    transform:translateY(-2px);
    border-color:rgba(34,211,238,.3);
}

.bet-row{
    background:#08111c;
    border:1px solid rgba(255,255,255,.05);
    border-radius:14px;
    padding:10px;
}

.table-wrap{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:700px;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    border-bottom:1px solid rgba(255,255,255,.06);
    text-align:left;
}

th{
    color:#94a3b8;
    font-size:12px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;

    background:rgba(2,6,23,.95);
    backdrop-filter:blur(18px);

    border-top:1px solid rgba(255,255,255,.08);

    display:flex;
    justify-content:space-around;

    padding:12px;
}

.live-dot{
    width:10px;
    height:10px;
    background:#22c55e;
    border-radius:999px;
    box-shadow:0 0 12px #22c55e;
}

.hero-number{
    font-size:clamp(2.5rem,7vw,5rem);
    font-weight:800;
    line-height:1;
}

.stats-grid{
    display:grid;
    grid-template-columns:
        repeat(auto-fit,minmax(180px,1fr));
    gap:14px;
}
</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-4">

    <!-- HEADER -->

    <header class="glass card-glow p-5 mb-5">

        <div class="flex justify-between items-center flex-wrap gap-4">

            <div>
                <h1 class="text-3xl font-extrabold tracking-wide">
                    AFRINODE
                </h1>

                <p class="text-slate-400 text-sm">
                    Premium Arbitrage Scanner
                </p>
            </div>

            <div class="flex items-center gap-3">

                <div class="flex items-center gap-2">
                    <div class="live-dot"></div>

                    <span class="text-green-400 text-sm">
                        LIVE
                    </span>
                </div>

                <span id="lastUpdated"
                      class="text-slate-400 text-sm">
                    --
                </span>

            </div>

        </div>

    </header>


    <!-- HERO -->

    <section
        class="glass card-glow p-8 mb-6">

        <div class="flex flex-col lg:flex-row justify-between gap-6">

            <div>

                <p class="text-slate-400 text-sm">
                    Best Opportunity
                </p>

                <div
                    id="heroProfit"
                    class="hero-number text-cyan-400">

                    0.00%

                </div>

                <p
                    id="heroProfitUgx"
                    class="text-slate-300 text-lg">

                    UGX 0

                </p>

            </div>

            <div class="text-right">

                <p
                    id="heroMatch"
                    class="text-xl font-semibold">

                </p>

                <p
                    id="heroMeta"
                    class="text-slate-400 mt-2">

                    Waiting for opportunities...

                </p>

            </div>

        </div>

    </section>


    <!-- STATS -->

    <section
        class="stats-grid mb-6">

        <div class="glass p-5">
            <p class="text-slate-400 text-sm">
                Live Opportunities
            </p>

            <h2
                id="statValid"
                class="text-4xl font-bold text-green-400">
                0
            </h2>
        </div>

        <div class="glass p-5">
            <p class="text-slate-400 text-sm">
                Invalid History
            </p>

            <h2
                id="statInvalid"
                class="text-4xl font-bold text-amber-400">
                0
            </h2>
        </div>

        <div class="glass p-5">
            <p class="text-slate-400 text-sm">
                Matches
            </p>

            <h2
                id="statMatches"
                class="text-4xl font-bold text-cyan-400">
                0
            </h2>
        </div>

        <div class="glass p-5">
            <p class="text-slate-400 text-sm">
                Bookmakers
            </p>

            <h2
                id="statBooks"
                class="text-4xl font-bold text-purple-400">
                0
            </h2>
        </div>

    </section>


    <!-- TABS -->

    <div class="flex gap-3 mb-5">

        <button
            class="nav-btn active"
            onclick="showPage('page-arbs',this)">
            Arbitrage
        </button>

        <button
            class="nav-btn"
            onclick="showPage('page-odds',this)">
            Raw Odds
        </button>

    </div>


    <!-- ARBS -->

    <section
        id="page-arbs"
        class="page active">

        <div
            id="arbsContainer"
            class="grid gap-5 md:grid-cols-2 xl:grid-cols-3">

        </div>

    </section>


    <!-- ODDS -->

    <section
        id="page-odds"
        class="page">

        <div class="glass p-5">

            <div class="flex justify-between mb-4">

                <h2 class="font-semibold">
                    Raw Odds Feed
                </h2>

                <span
                    id="oddsCount"
                    class="text-slate-400">

                    0 Rows

                </span>

            </div>

            <div
                id="oddsTable"
                class="table-wrap">

            </div>

        </div>

    </section>

</div>


<!-- MOBILE NAV -->

<div class="bottom-nav">

    <button
        class="nav-btn active"
        onclick="showPage('page-arbs',this)">
        ⚡
    </button>

    <button
        class="nav-btn"
        onclick="showPage('page-odds',this)">
        📊
    </button>

</div>


<script>

let state = {
    opportunities: [],
    raw_odds: [],
    history: [],
    last_updated: null,
    total_matches: 0,
    bookmakers: []
};

function showPage(page,btn){

    document
        .querySelectorAll('.page')
        .forEach(p=>p.classList.remove('active'));

    document
        .getElementById(page)
        .classList.add('active');

    document
        .querySelectorAll('.nav-btn')
        .forEach(b=>b.classList.remove('active'));

    btn.classList.add('active');
}


async function loadOdds(){

    try{

        const res =
            await fetch(
                "odds.json?t="+Date.now(),
                {cache:"no-store"}
            );

        const data = await res.json();

        state = {
            ...state,
            ...data
        };

        renderStats();
        renderHero();
        renderArbs();
        renderOdds();

    }catch(e){

        console.log(e);

    }

}


function renderStats(){

    document.getElementById(
        'statValid'
    ).innerText =
        state.opportunities.length;

    document.getElementById(
        'statInvalid'
    ).innerText =
        Math.max(
            state.history.length -
            state.opportunities.length,
            0
        );

    document.getElementById(
        'statMatches'
    ).innerText =
        state.total_matches || 0;

    document.getElementById(
        'statBooks'
    ).innerText =
        (state.bookmakers || []).length;

}


function renderHero(){

    if(!state.opportunities.length)
        return;

    let best =
        state.opportunities.reduce(
            (a,b)=>
                b.profit_percent >
                a.profit_percent
                ? b
                : a
        );

    heroProfit.innerText =
        Number(
            best.profit_percent
        ).toFixed(2)+"%";

    heroProfitUgx.innerText =
        "UGX "+
        Number(
            best.profit_ugx || 0
        ).toLocaleString();

    heroMatch.innerText =
        best.match || "";

    heroMeta.innerText =
        (best.sport || "")+
        " • "+
        (best.competition || "");

}


function renderArbs(){

    const c =
        document.getElementById(
            'arbsContainer'
        );

    if(!state.opportunities.length){

        c.innerHTML =
        `<div class="glass p-6 text-center">
            No opportunities found.
        </div>`;

        return;
    }

    c.innerHTML =
        state.opportunities.map(o=>`

        <div class="arb-card">

            <div class="flex justify-between">

                <div>

                    <h3 class="font-bold">
                        ${o.match}
                    </h3>

                    <p class="text-slate-400 text-sm">
                        ${o.sport || ""}
                    </p>

                </div>

                <div
                    class="text-green-400 font-bold">

                    +${Number(
                        o.profit_percent
                    ).toFixed(2)}%

                </div>

            </div>

            <div class="mt-4 space-y-3">

                ${(o.bets||[]).map(b=>`

                <div class="bet-row flex justify-between">

                    <div>

                        <div class="font-semibold text-cyan-400">
                            ${b.bookmaker}
                        </div>

                        <div class="text-sm text-slate-400">
                            ${b.selection || ""}
                        </div>

                    </div>

                    <div class="text-right">

                        <div>
                            @ ${b.odd}
                        </div>

                        <div class="text-slate-400 text-sm">
                            UGX ${Number(
                                b.stake||0
                            ).toLocaleString()}
                        </div>

                    </div>

                </div>

                `).join("")}

            </div>

        </div>

        `).join("");

}


function renderOdds(){

    oddsCount.innerText =
        state.raw_odds.length+" rows";

    oddsTable.innerHTML = `

    <table>

        <thead>

            <tr>
                <th>Match</th>
                <th>Bookmaker</th>
                <th>Home</th>
                <th>Draw</th>
                <th>Away</th>
            </tr>

        </thead>

        <tbody>

            ${state.raw_odds.map(o=>`

            <tr>

                <td>${o.match}</td>
                <td>${o.bookmaker}</td>
                <td>${o.home||'-'}</td>
                <td>${o.draw||'-'}</td>
                <td>${o.away||'-'}</td>

            </tr>

            `).join("")}

        </tbody>

    </table>

    `;

}


loadOdds();
setInterval(loadOdds,30000);

</script>

</body>
</html>
