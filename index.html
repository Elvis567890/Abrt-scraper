<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbitrage Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1120;
    color:#fff;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    border-bottom:1px solid #1f2937;
}

header h1{
    font-size:28px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#111827;
    border-radius:15px;
    padding:20px;
}

.card h3{
    color:#9ca3af;
    font-size:15px;
}

.card h1{
    margin-top:10px;
    font-size:32px;
}

.container{
    padding:20px;
}

.match{
    background:#111827;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    cursor:pointer;
    transition:.3s;
}

.match:hover{
    transform:translateY(-3px);
}

.row{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
}

.profit{
    color:#22c55e;
    font-size:28px;
    font-weight:bold;
}

.small{
    color:#9ca3af;
    margin-top:5px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-box{
    background:#111827;
    width:95%;
    max-width:850px;
    max-height:90vh;
    overflow:auto;
    border-radius:20px;
    padding:25px;
}

.close{
    float:right;
    font-size:35px;
    cursor:pointer;
}

.bet{
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

.history{
    background:#1f2937;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>
<body>

<header>
    <h1>⚡ Arbitrage Live Dashboard</h1>
</header>

<div class="stats">

    <div class="card">
        <h3>Total Opportunities</h3>
        <h1 id="total">0</h1>
    </div>

    <div class="card">
        <h3>Highest Profit</h3>
        <h1 id="highest">0%</h1>
    </div>

    <div class="card">
        <h3>Estimated Profit</h3>
        <h1 id="profit">UGX 0</h1>
    </div>

    <div class="card">
        <h3>Last Update</h3>
        <h1 id="time">--</h1>
    </div>

</div>

<div class="container" id="matches"></div>

<div class="modal" id="modal">

    <div class="modal-box">

        <span class="close" onclick="closeModal()">
            ×
        </span>

        <div id="modalContent"></div>

    </div>

</div>

<script>

async function loadStats(){

    try{

        const res =
            await fetch("/api/stats");

        const data =
            await res.json();

        document.getElementById("total")
        .innerText =
            data.total_opportunities;

        document.getElementById("highest")
        .innerText =
            data.highest_profit + "%";

        document.getElementById("profit")
        .innerText =
            "UGX " +
            Number(data.estimated_profit_ugx)
            .toLocaleString();

        document.getElementById("time")
        .innerText =
            new Date(data.server_time)
            .toLocaleTimeString();

    }catch(e){
        console.log(e);
    }
}

async function loadMatches(){

    try{

        const res =
            await fetch("/api/opportunities");

        const matches =
            await res.json();

        let html = "";

        matches.forEach(m=>{

            html += `
            <div class="match"
                 onclick='showMatch(${JSON.stringify(m)})'>

                <div class="row">

                    <div>

                        <h2>${m.match}</h2>

                        <div class="small">
                            ${m.sport}
                        </div>

                    </div>

                    <div>

                        <div class="profit">
                            ${m.profit_percent}%
                        </div>

                        <div class="small">
                            First:
                            ${m.initial_profit}%
                        </div>

                    </div>

                </div>

                <div class="small">
                    Updates:
                    ${m.update_count}
                </div>

                <div class="small">
                    First Seen:
                    ${formatDate(m.first_seen)}
                </div>

                <div class="small">
                    Last Updated:
                    ${formatDate(m.last_seen)}
                </div>

            </div>
            `;
        });

        document.getElementById("matches")
        .innerHTML = html;

    }catch(e){
        console.log(e);
    }

}

function showMatch(item){

    let bets = "";

    item.bets.forEach(b=>{

        bets += `
        <div class="bet">

            <b>${b.outcome}</b><br><br>

            Bookmaker:
            ${b.bookmaker}<br>

            Odd:
            ${b.odd}<br>

            Stake:
            UGX ${Number(b.stake).toLocaleString()}<br>

            Possible Return:
            UGX ${Number(b.win).toLocaleString()}

        </div>
        `;
    });

    let history = "";

    if(item.history){

        item.history.forEach(h=>{

            history += `
            <div class="history">

                ${formatDate(h.time)}
                <br>

                Profit:
                ${h.profit}%

            </div>
            `;
        });
    }

    document.getElementById("modalContent")
    .innerHTML = `

        <h1>${item.match}</h1>

        <br>

        <h2>
            Current Profit:
            ${item.profit_percent}%
        </h2>

        <br>

        <h3>
            Initial Profit:
            ${item.initial_profit}%
        </h3>

        <br>

        <h3>
            Updates:
            ${item.update_count}
        </h3>

        <br>

        <h3>
            Profit:
            UGX ${Number(item.profit_ugx)
            .toLocaleString()}
        </h3>

        <br>

        <h2>Bet Instructions</h2>

        ${bets}

        <br>

        <h2>Profit History</h2>

        ${history}

    `;

    document.getElementById("modal")
    .style.display =
        "flex";
}

function closeModal(){

    document.getElementById("modal")
    .style.display =
        "none";
}

function formatDate(date){

    if(!date) return "--";

    return new Date(date)
    .toLocaleString();
}

loadStats();
loadMatches();

setInterval(()=>{

    loadStats();
    loadMatches();

},10000);

</script>

</body>
</html>
