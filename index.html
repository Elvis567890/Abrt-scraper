<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arbitrage Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1120;
    color:white;
}

.header{
    padding:20px;
    background:#111827;
    border-bottom:1px solid #1f2937;
}

.header h1{
    font-size:28px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:15px;
}

.card h2{
    font-size:15px;
    color:#9ca3af;
}

.card h1{
    margin-top:10px;
    font-size:30px;
}

.matches{
    padding:20px;
}

.match{
    background:#111827;
    margin-bottom:15px;
    border-radius:15px;
    padding:20px;
    cursor:pointer;
    transition:0.3s;
}

.match:hover{
    transform:scale(1.02);
}

.match-header{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
}

.profit{
    color:#22c55e;
    font-size:24px;
    font-weight:bold;
}

.small{
    color:#9ca3af;
    margin-top:8px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-box{
    background:#111827;
    width:95%;
    max-width:800px;
    padding:25px;
    border-radius:20px;
    max-height:90vh;
    overflow:auto;
}

.close{
    float:right;
    font-size:30px;
    cursor:pointer;
}

.bet{
    background:#1f2937;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
}

.history{
    margin-top:20px;
}

.history-item{
    background:#1f2937;
    margin-top:8px;
    padding:10px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="header">
    <h1>⚡ Arbitrage Television Dashboard</h1>
</div>

<div class="stats">

    <div class="card">
        <h2>Total Opportunities</h2>
        <h1 id="total">0</h1>
    </div>

    <div class="card">
        <h2>Highest Profit</h2>
        <h1 id="highest">0%</h1>
    </div>

    <div class="card">
        <h2>Estimated Profit</h2>
        <h1 id="ugx">UGX 0</h1>
    </div>

    <div class="card">
        <h2>Last Update</h2>
        <h1 id="time">--</h1>
    </div>

</div>

<div class="matches" id="matches"></div>

<div class="modal" id="modal">

    <div class="modal-box">

        <span class="close" onclick="closeModal()">
            ×
        </span>

        <div id="modalContent"></div>

    </div>

</div>

<script>

const API = "http://YOUR_SERVER_IP:5000";

async function loadStats(){

    try{

        const res = await fetch(API+"/api/stats");
        const data = await res.json();

        document.getElementById("total").innerText =
            data.total_opportunities;

        document.getElementById("highest").innerText =
            data.highest_profit + "%";

        document.getElementById("ugx").innerText =
            "UGX " +
            Number(data.estimated_profit_ugx)
            .toLocaleString();

        document.getElementById("time").innerText =
            new Date(data.server_time)
            .toLocaleTimeString();

    }catch(err){
        console.log(err);
    }

}

async function loadMatches(){

    try{

        const res =
            await fetch(API+"/api/opportunities");

        const data = await res.json();

        let html = "";

        data.forEach(item=>{

            html += `
            <div class="match"
                 onclick='showMatch(${JSON.stringify(item)})'>

                <div class="match-header">

                    <div>

                        <h2>${item.match}</h2>

                        <div class="small">
                            ${item.sport}
                        </div>

                    </div>

                    <div>

                        <div class="profit">
                            ${item.profit_percent}%
                        </div>

                        <div class="small">
                            First:
                            ${item.initial_profit}%
                        </div>

                    </div>

                </div>

                <div class="small">
                    Updates:
                    ${item.update_count}
                </div>

                <div class="small">
                    First Seen:
                    ${format(item.first_seen)}
                </div>

                <div class="small">
                    Last Updated:
                    ${format(item.last_seen)}
                </div>

            </div>
            `;
        });

        document.getElementById("matches").innerHTML =
            html;

    }catch(err){
        console.log(err);
    }

}

function showMatch(item){

    let bets = "";

    item.bets.forEach(b=>{

        bets += `
        <div class="bet">

            <b>${b.outcome}</b><br>

            Bookmaker:
            ${b.bookmaker}<br>

            Odd:
            ${b.odd}<br>

            Stake:
            UGX ${Number(b.stake)
            .toLocaleString()}<br>

            Return:
            UGX ${Number(b.win)
            .toLocaleString()}

        </div>
        `;
    });

    let history = "";

    if(item.history){

        item.history.reverse().forEach(h=>{

            history += `
            <div class="history-item">

                ${format(h.time)}
                —
                ${h.profit}%

            </div>
            `;

        });

    }

    document.getElementById("modalContent")
    .innerHTML = `

        <h1>${item.match}</h1>

        <br>

        <h2>
            Current Profit:
            ${item.profit_percent}%
        </h2>

        <br>

        <h3>
            First Profit:
            ${item.initial_profit}%
        </h3>

        <br>

        <h3>
            Updates:
            ${item.update_count}
        </h3>

        <br>

        <h3>
            Profit:
            UGX ${Number(item.profit_ugx)
            .toLocaleString()}
        </h3>

        <br>

        <h2>Bet Instructions</h2>

        ${bets}

        <div class="history">

            <br>

            <h2>Profit History</h2>

            ${history}

        </div>

    `;

    document.getElementById("modal")
    .style.display = "flex";
}

function closeModal(){

    document.getElementById("modal")
    .style.display = "none";

}

function format(date){

    if(!date) return "--";

    return new Date(date)
        .toLocaleString();

}

loadStats();
loadMatches();

setInterval(()=>{

    loadStats();
    loadMatches();

},10000);

</script>

</body>
</html>
