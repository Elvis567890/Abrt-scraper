name: Run odds scraper

on:
  # Runs automatically when you push to main,
  # and you can also run it manually from the Actions tab.
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    # Make secrets and environment available to Python code
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps

      - name: Debug GEMINI_API_KEY visibility
        run: |
          python -c "import os; print('GEMINI_API_KEY is set:', bool(os.environ.get('GEMINI_API_KEY'))) "

      - name: Run odds scraper
        run: |
          python scraper.py
