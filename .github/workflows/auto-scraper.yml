name: Scrape and Deploy Arbitrage Data

on:
  schedule:
    - cron: '*/30 *'  # every 30 minutes
  workflow_dispatch: # lets you run it manually + cron-job.org can trigger this

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # CHANGED: Use arbitrage_bot.py since that's your main file
      - name: Run Arbitrage Bot
        run: python arbitrage_bot.py --once
        env:
          # Add your API keys here as GitHub Secrets later
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Find and copy JSONs to root
        run: |
          echo "Searching for JSON files..."
          find . -name "current_opportunities.json" -exec cp {} . \;
          find . -name "arb_history.json" -exec cp {} . \;
          echo "Current directory contents:"
          ls -la *.json || echo "No JSON files found"

      - name: Commit and push updated JSON files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Force-add the new JSON files so git tracks them
          git add -f current_opportunities.json arb_history.json 2>/dev/null || true
          
          # Only commit if there are changes to the staged files
          git diff --staged --quiet || git commit -m "Update arbitrage data [skip ci]"
          git push
