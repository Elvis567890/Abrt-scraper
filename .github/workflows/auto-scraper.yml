name: Auto Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can pull/push safely

      - name: Ensure main is up to date BEFORE changes
        run: |
          git fetch origin
          git checkout main
          git pull origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      # Install Playwright browsers so BetPawa scraper works in CI
      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        # Only include env vars that scraper.py actually uses
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          python scraper.py

      - name: Upload arbitrage results artifact
        uses: actions/upload-artifact@v4
        with:
          name: arbitrage-results
          path: |
            odds.json
            arbitrage_history.json
            odds_freshness.json
            odds.html

      - name: Commit and push updated odds files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add odds.json arbitrage_history.json odds_freshness.json odds.html || true
          git commit -m "Update arbitrage results (CI)" || echo "No changes to commit"
          git push origin main
