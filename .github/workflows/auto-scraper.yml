# .github/workflows/scraper.yml
name: Auto Scraper #5204

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright google-genai python-dotenv
          playwright install chromium
      
      - name: Run scraper
        run: python YOUR_ACTUAL_FILENAME.py  # ← CHANGE THIS to your filename!
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: arbitrage-results
          path: |
            arbitrage_history.json
            latest_report.json
            *.db
            *.log
