name: Auto Scraper #5204

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
      
      - name: Run scraper
        run: python scraper.py  # ← YOUR ACTUAL FILENAME!
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STAKE_UGX: 100000
          STALE_ODDS_MINUTES: 5
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: arbitrage-results
          path: |
            arbitrage_history.json
            odds.json
            *.db
            *.log
          retention-days: 7
      
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add arbitrage_history.json odds.json *.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update arbitrage results [skip ci]"
          git push
