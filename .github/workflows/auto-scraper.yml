name: Scrape Data and Build APK

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # === YOUR ORIGINAL SCRAPING JOB (100% UNTOUCHED) ===
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Run Python scraper
        run: python scraper.py

      - name: Find and copy JSONs to root
        run: |
          echo "Searching for JSON files..."
          find . -name "current_opportunities.json" -exec cp {} . \;
          find . -name "arb_history.json" -exec cp {} . \;
          echo "Current directory contents:"
          ls -la

      - name: Commit and push updated JSON files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f current_opportunities.json arb_history.json
          git diff --staged --quiet || git commit -m "Update arbitrage data [skip ci]"
          git pull --rebase origin main
          git push

  # === APK BUILDER (100% FIXED PATH SEARCH) ===
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli

      - name: Create web assets folder
        run: mkdir www

      - name: Copy your web files into the folder
        run: cp index.html style.css main.js manifest.json www/ || true

      - name: Package Android APK
        run: npx pwabuilder package --platforms android --output ./out ./www

      # This now searches the ENTIRE workspace for the APK, not just one specific folder
      - name: Find and Prepare APK for download
        run: |
          echo "🔍 Searching for APK in the entire workspace..."
          APK_FILE=$(find . -name "*.apk" | head -n 1)
          
          if [ -z "$APK_FILE" ]; then
            echo "❌ ERROR: No APK file was generated. Check logs above."
            echo "Listing current directory contents to help debug:"
            ls -la
            exit 1
          fi
          
          echo "✅ APK found at: $APK_FILE"
          cp "$APK_FILE" app-debug.apk

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arbimax-app
          path: app-debug.apk
