name: Scrape Data and Build APK

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # === YOUR ORIGINAL SCRAPING JOB (100% UNTOUCHED) ===
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Run Python scraper
        run: python scraper.py

      - name: Find and copy JSONs to root
        run: |
          echo "Searching for JSON files..."
          find . -name "current_opportunities.json" -exec cp {} . \;
          find . -name "arb_history.json" -exec cp {} . \;
          echo "Current directory contents:"
          ls -la

      - name: Commit and push updated JSON files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f current_opportunities.json arb_history.json
          git diff --staged --quiet || git commit -m "Update arbitrage data [skip ci]"
          git pull --rebase origin main
          git push

  # === FIXED APK BUILDER ===
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # (All previous fixes remain intact exactly as they were)
      - name: Initialize Capacitor and Create Android folder
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init ArbiMax com.elvis.arbimax .
          npx cap add android

      # ===== NEWLY ADDED LINE TO FIX "./www" ERROR =====
      - name: Force Capacitor to look at the root folder
        run: sed -i 's/"webDir": "www"/"webDir": "."/' capacitor.config.json

      - name: Sync your HTML/CSS files into the Android app
        run: npx cap sync android

      - name: Build the APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arbimax-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
