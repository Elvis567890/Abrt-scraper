# .github/workflows/scraper.yml
name: Auto Scraper #5204

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # Built-in caching
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright google-genai python-dotenv
          playwright install chromium
        
      - name: Run scraper
        run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STAKE_UGX: 100000
          STALE_ODDS_MINUTES: 5
          MIN_PROFIT_PERCENT: 0.5
          MAX_PROFIT_PERCENT: 20.0
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: arbitrage-results
          path: |
            arbitrage_history.json
            latest_report.json
            *.db
            *.log
            scan_summary.json
          retention-days: 7
          if-no-files-found: ignore
      
      - name: Commit and push results
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add arbitrage_history.json latest_report.json *.db scan_summary.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update arbitrage results [skip ci]"
          git push
