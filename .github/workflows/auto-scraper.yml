name: Scrape and Deploy Arbitrage Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 playwright \
                      PyJWT bcrypt python-dotenv \
                      Flask Flask-CORS Flask-SQLAlchemy
          playwright install chromium --with-deps

      - name: Run Python scraper
        run: python scraper.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTION: 1   # 👈 tells your script to skip the Flask app

      - name: Find and copy JSONs to root + Debug
        run: |
          echo "Searching for JSON files..."
          find . -name "current_opportunities.json" -exec cp {} . \;
          find . -name "arb_history.json" -exec cp {} . \;
          echo "=== JSON CONTENT PREVIEW ==="
          head -n 20 current_opportunities.json || echo "FILE NOT FOUND"
          echo "=== END PREVIEW ==="
          ls -la *.json
          echo "Triggering Pages rebuild at $(date)" > trigger_rebuild.txt

      - name: Commit and push updated JSON files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f current_opportunities.json arb_history.json trigger_rebuild.txt
          git diff --staged --quiet || git commit -m "Update arbitrage data and force Pages rebuild [skip ci]"
          git pull --rebase origin main
          git push
